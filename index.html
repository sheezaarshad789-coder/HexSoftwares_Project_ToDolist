<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTask Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="app-wrapper">
    <div class="header-row">
        <h1>ProTask<span>.</span></h1>
        <div class="theme-switch" onclick="toggleTheme()">
            <i id="theme-icon" class="fas fa-moon"></i>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <span id="total-tasks">0</span>
            <small>Total</small>
        </div>
        <div class="stat-box">
            <span id="completed-tasks">0</span>
            <small>Done</small>
        </div>
    </div>

    <div class="input-section">
        <input type="text" id="task-input" placeholder="What's your plan?">
        <div class="sub-inputs">
            <input type="date" id="task-date">
            <select id="category-select">
                <option value="Work">💼 Work</option>
                <option value="Personal">🏠 Personal</option>
                <option value="Urgent">🔥 Urgent</option>
            </select>
            <button id="add-task-btn"><i class="fas fa-plus"></i></button>
        </div>
    </div>

    <ul id="task-list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
